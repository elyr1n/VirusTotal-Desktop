<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #0a0c10;
            background-image: 
                linear-gradient(rgba(0, 110, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 110, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .card {
            background: #0f1219;
            border: 1px solid #1e2a3a;
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        .title {
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #fff 0%, #0066ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .upload-area {
            border: 2px dashed #1e2a3a;
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #0066ff;
            background: rgba(0, 102, 255, 0.05);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .upload-text {
            color: #7f9fcc;
            font-size: 0.9rem;
        }

        .file-name {
            background: #010409;
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #b0d4ff;
            word-break: break-all;
            display: none;
        }

        .file-name.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0.75rem;
        }

        .btn-primary {
            background: #0066ff;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #0052cc;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 102, 255, 0.3);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid #1e2a3a;
            color: #7f9fcc;
        }

        .btn-secondary:hover {
            border-color: #0066ff;
            color: #0066ff;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #010409;
            border-radius: 0.75rem;
            border-left: 3px solid #0066ff;
            font-size: 0.85rem;
            word-break: break-all;
        }

        .result.error {
            border-left-color: #ff5555;
            color: #ff5555;
        }

        .result.success {
            border-left-color: #00cc66;
            color: #00cc66;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="upload-area" id="uploadArea">
            <div class="upload-text">Click to select file or drag & drop</div>
            <div class="upload-text" style="font-size: 0.75rem; margin-top: 0.5rem;">Maximum file size: 650 MB</div>
        </div>
        <div class="file-name" id="fileName"></div>
        <button class="btn btn-primary" id="upload" disabled>Upload</button>
        <button class="btn btn-secondary" id="return">Back to Menu</button>
        <div class="result" id="result" style="display: none;"></div>
    </div>

    <script src="js/upload.js"></script>
</body>
</html>
