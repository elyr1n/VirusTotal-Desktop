<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VirusTotal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #0a0c10;
            background-image: 
                linear-gradient(rgba(0, 110, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 110, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .spider-web {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .spider-web svg {
            width: 100%;
            height: 100%;
            opacity: 0.25;
        }

        .spider-web path {
            stroke: #0066ff;
            stroke-width: 1.2;
            fill: none;
            stroke-dasharray: 8 12;
            animation: crawl 28s linear infinite;
        }

        @keyframes crawl {
            to {
                stroke-dashoffset: -200;
            }
        }

        .spider-web line {
            stroke: #0066ff;
            stroke-width: 0.8;
            opacity: 0.3;
            animation: pulseGlow 4s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.2; stroke-width: 0.8; }
            50% { opacity: 0.6; stroke-width: 1.5; }
        }

        .card {
            position: relative;
            z-index: 10;
            background-color: #0f1219;
            border: 1px solid #1e2a3a;
            border-radius: 2rem;
            padding: 2.5rem 2.8rem;
            width: 100%;
            max-width: 620px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(0, 102, 255, 0.2), 0 0 30px rgba(0, 102, 255, 0.3);
            backdrop-filter: blur(2px);
            transition: box-shadow 0.3s ease, border-color 0.2s;
        }

        .card:hover {
            border-color: #0066ff;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.9), 0 0 0 3px rgba(0, 102, 255, 0.5), 0 0 50px #0066ff44;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2.8rem;
        }

        .input-label {
            color: #b0d4ff;
            font-weight: 500;
            letter-spacing: 0.03em;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-label span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #0066ff;
            border-radius: 0;
            animation: blinkDot 1.8s step-end infinite;
        }

        @keyframes blinkDot {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #0066ff; }
            50% { opacity: 0.2; box-shadow: none; }
        }

        .field-row {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-text {
            flex: 1;
            background: #010409;
            border: 1.5px solid #1f2c3c;
            border-radius: 25px;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            color: #e5efff;
            outline: none;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }

        .input-text:focus {
            border-color: #0066ff;
            box-shadow: 0 0 20px #0066ff33, inset 0 0 5px #0066ff22;
            background-color: #03060b;
        }

        .input-text::placeholder {
            color: #2e405b;
            font-weight: 300;
            font-size: 0.95rem;
        }

        .btn-analyze {
            background: #000c1a;
            border: 2px solid #0066ff;
            color: #0066ff;
            font-weight: 700;
            font-size: 1.1rem;
            padding: 0.9rem 2.2rem;
            border-radius: 25px;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: 0.2s ease;
            box-shadow: 0 0 15px #0066ff22;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            white-space: nowrap;
        }

        .btn-analyze:hover {
            background: #0066ff;
            color: #0a0c10;
            border-color: #0066ff;
            box-shadow: 0 0 30px #0066ff, 0 0 80px #0066ff66;
            transform: scale(1.02);
        }

        .btn-analyze:active {
            transform: scale(0.98);
        }

        .info-panel {
            background: #04080f;
            border-radius: 1.8rem;
            padding: 1.8rem 2rem;
            border: 1px solid #1b2635;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            box-shadow: inset 0 0 15px #000000, 0 10px 20px #00000080;
        }

        .info-row {
            display: flex;
            align-items: baseline;
            border-bottom: 1px dashed #1e3144;
            padding-bottom: 0.7rem;
            transition: border-color 0.2s, padding-left 0.2s;
        }

        .info-row:hover {
            border-bottom-color: #0066ff;
            padding-left: 0.8rem;
        }

        .info-tag {
            width: 130px;
            color: #7f9fcc;
            font-weight: 400;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1.5px;
            opacity: 0.9;
        }

        .info-value {
            flex: 1;
            color: #ebf3ff;
            font-weight: 500;
            font-size: 1.2rem;
            word-break: break-word;
            text-shadow: 0 0 8px #0066ff80;
            transition: text-shadow 0.2s;
        }

        .info-row:hover .info-value {
            text-shadow: 0 0 12px #0066ff, 0 0 25px #0066ff;
        }

        @keyframes pulseText {
            from { opacity: 0.5; box-shadow: 0 0 3px #0066ff; }
            to { opacity: 1; box-shadow: 0 0 18px #0066ff, 0 0 30px #0066ff; }
        }

        .result-scan-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 1rem;
        }

        .cyber-glitch {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="spider-web">
        <svg viewBox="0 0 1000 800" preserveAspectRatio="none">
            <path d="M0,0 L1000,800 M1000,0 L0,800 M500,0 L500,800 M0,400 L1000,400 M250,0 L250,800 M750,0 L750,800 M0,200 L1000,600 M0,600 L1000,200" />
            <line x1="0" y1="0" x2="1000" y2="800" />
            <line x1="1000" y1="0" x2="0" y2="800" />
            <line x1="500" y1="0" x2="500" y2="800" />
            <line x1="0" y1="400" x2="1000" y2="400" />
            <circle cx="500" cy="400" r="120" fill="none" stroke="#0066ff" stroke-width="0.6" stroke-dasharray="6 10" />
            <circle cx="500" cy="400" r="220" fill="none" stroke="#0066ff" stroke-width="0.5" stroke-dasharray="10 16" />
        </svg>
    </div>

    <main class="card">
        <div class="input-group">
            <label class="input-label" for="virustotal_file_id">
                <span></span> File-Hash / ID
            </label>
            <div class="field-row">
                <input type="text" id="virustotal_file_id" name="virustotal_file_id" class="input-text" placeholder="e.g. 275a021bbfb6489e54d471899f7db9d1663fc695ec2fe2a2c4538aabf651fd0f">
                <button id="virustotal_analyze" class="btn-analyze">Analyze</button>
            </div>
        </div>

        <div class="info-panel">
            <div class="info-row">
                <span class="info-tag">File-Name</span>
                <span class="info-value" id="file_name">—</span>
            </div>
            <div class="info-row">
                <span class="info-tag">File-Size</span>
                <span class="info-value" id="file_size">—</span>
            </div>
            <div class="info-row">
                <span class="info-tag">Result-Scan</span>
                <div class="result-scan-container" style="flex:1;">
                    <span class="info-value" id="result_scan" style="flex:0 1 auto;">—</span>
                </div>
            </div>
        </div>
    </main>

    <script src="js/analyze.js"></script>
</body>
</html>
